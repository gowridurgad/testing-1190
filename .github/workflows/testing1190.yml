name: Testing1190

on:
  workflow_dispatch:

jobs:
  test-cache-key:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest','macos-latest','windows-latest', 'ubuntu-24.04-arm', 'windows-11-arm', 'macos-15-intel']
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v6
     
      - name: Setup Node 
        id: setup
        # uses: actions/setup-node@v6  
        # uses: alexdunae/setup-node@main
        uses: gowridurgad/setup-node@testing-1009
        with:
          node-version: 24
          cache: yarn
          check-latest: true
      - name: Install deps
        run: yarn install
        
      - name: output
        run: echo "Used cache key was ${{ steps.setup.outputs.cache-key }}"
